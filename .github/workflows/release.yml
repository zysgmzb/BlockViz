name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            artifact_name: BlockViz-windows-x64.exe
            source_path: dist/BlockViz.exe
          - os: macos-latest
            label: macOS
            artifact_name: BlockViz-macos
            source_path: dist/BlockViz
          - os: ubuntu-latest
            label: Linux x64
            artifact_name: BlockViz-linux-x64
            source_path: dist/BlockViz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[packaging]'

      - name: Build packaged app
        run: python -m PyInstaller --noconfirm --clean BlockViz.spec

      - name: Stage Windows release asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "${{ matrix.source_path }}" "release/${{ matrix.artifact_name }}"

      - name: Stage macOS/Linux release asset
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp "${{ matrix.source_path }}" "release/${{ matrix.artifact_name }}"
          chmod +x "release/${{ matrix.artifact_name }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.artifact_name }}
