name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            artifact_name: windows-x64
          - os: macos-latest
            label: macOS
            artifact_name: macos
          - os: ubuntu-latest
            label: Linux x64
            artifact_name: linux-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[packaging]'

      - name: Build packaged app
        run: python -m PyInstaller --noconfirm --clean BlockViz.spec

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME.TrimStart('v') } else { 'dev' }
          Compress-Archive -Path dist/BlockViz/* -DestinationPath "release/BlockViz-$version-${{ matrix.artifact_name }}.zip"

      - name: Archive macOS build
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-dev}"
          ditto -c -k --sequesterRsrc --keepParent dist/BlockViz release/BlockViz-${VERSION}-${{ matrix.artifact_name }}.zip

      - name: Archive Linux build
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-dev}"
          tar -C dist -czf release/BlockViz-${VERSION}-${{ matrix.artifact_name }}.tar.gz BlockViz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlockViz-${{ matrix.artifact_name }}
          path: release/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
